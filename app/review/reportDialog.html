<body><div mat-dialog-content>
  <mat-form-field appearance="fill">
  <mat-label>Select</mat-label>
    <mat-select [(ngModel)]="data.report_reason">
      <mat-option value="one" ngDefaultControl>First option is rules violating</mat-option>
      <mat-option value="two" ngDefaultControl>Second option is comic image</mat-option>
      <mat-option value="three" ngDefaultControl>Third option is abusive</mat-option>
    </mat-select>
  </mat-form-field> 
</div> 
<div mat-dialog-actions>
  <button mat-button (click)="onNoClick()">Cancel</button> &nbsp; &nbsp; &nbsp; &nbsp;
  <button mat-button [mat-dialog-close]="data.report_reason" cdkFocusInitial>Ok</button>
</div>
</body>
